name: PR checks

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate-skills:
    name: Validate skills
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify skill structure
        run: |
          exit_code=0
          for skill_dir in skills/*/; do
            skill_name=$(basename "$skill_dir")
            if [ ! -f "$skill_dir/SKILL.md" ]; then
              echo "::error::Skill '$skill_name' is missing SKILL.md"
              exit_code=1
            fi
            if [ ! -d "$skill_dir/rules" ]; then
              echo "::error::Skill '$skill_name' is missing rules/ directory"
              exit_code=1
            fi
          done
          exit $exit_code

  validate-commits:
    name: Validate commit messages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check conventional commit format
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"

          # Allowed types aligned with the changelog categories in release.yml:
          #   feat     -> Added
          #   fix      -> Fixed
          #   chore, docs, style, refactor, perf, test, build, ci, revert -> Changed
          PATTERN='^(feat|fix|chore|docs|style|refactor|perf|test|build|ci|revert)(\([a-z0-9._-]+\))?(!)?: .+'

          exit_code=0
          while IFS= read -r sha; do
            msg=$(git log --format='%s' -n 1 "$sha")

            # Skip merge commits generated by GitHub
            if echo "$msg" | grep -qE '^Merge (branch|pull request) '; then
              continue
            fi

            if ! echo "$msg" | grep -qE "$PATTERN"; then
              echo "::error::Bad commit message in ${sha:0:7}: \"$msg\""
              echo "  Expected format: <type>[optional scope][!]: <description>"
              echo "  Allowed types: feat, fix, chore, docs, style, refactor, perf, test, build, ci, revert"
              echo ""
              exit_code=1
            fi
          done < <(git rev-list "$BASE".."$HEAD")

          if [ $exit_code -eq 0 ]; then
            echo "All commit messages follow the conventional commit format."
          fi

          exit $exit_code
