name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  validate:
    name: Validate skills
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify skill structure
        run: |
          exit_code=0
          for skill_dir in skills/*/; do
            skill_name=$(basename "$skill_dir")
            if [ ! -f "$skill_dir/SKILL.md" ]; then
              echo "::error::Skill '$skill_name' is missing SKILL.md"
              exit_code=1
            fi
          done
          exit $exit_code

  release:
    name: Create GitHub release
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next version
        id: version
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          MAJOR=$(echo "$LAST_TAG" | sed 's/^v//' | cut -d. -f1)
          MINOR=$(echo "$LAST_TAG" | sed 's/^v//' | cut -d. -f2)
          PATCH=$(echo "$LAST_TAG" | sed 's/^v//' | cut -d. -f3)

          case "${{ inputs.bump }}" in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
          esac

          echo "tag=v${MAJOR}.${MINOR}.${PATCH}" >> "$GITHUB_OUTPUT"
          echo "last_tag=$LAST_TAG" >> "$GITHUB_OUTPUT"

      - name: Generate changelog entry
        id: changelog
        env:
          TAG: ${{ steps.version.outputs.tag }}
          LAST_TAG: ${{ steps.version.outputs.last_tag }}
        run: |
          if [ "$LAST_TAG" = "v0.0.0" ]; then
            RANGE="HEAD"
          else
            RANGE="${LAST_TAG}..HEAD"
          fi

          FEATS=""
          FIXES=""
          OTHER=""

          while IFS= read -r line; do
            # Strip conventional commit prefix and optional scope for the summary
            summary=$(echo "$line" | sed -E 's/^[a-z]+(\([^)]*\))?!?: //')
            case "$line" in
              feat*)  FEATS="${FEATS}- ${summary}\n" ;;
              fix*)   FIXES="${FIXES}- ${summary}\n" ;;
              *)      OTHER="${OTHER}- ${summary}\n" ;;
            esac
          done < <(git log --pretty=format:"%s" "$RANGE")

          {
            echo "## ${TAG} ($(date +%Y-%m-%d))"
            echo ""
            if [ -n "$FEATS" ]; then
              echo "### Added"
              echo ""
              echo -e "$FEATS"
            fi
            if [ -n "$FIXES" ]; then
              echo "### Fixed"
              echo ""
              echo -e "$FIXES"
            fi
            if [ -n "$OTHER" ]; then
              echo "### Changed"
              echo ""
              echo -e "$OTHER"
            fi
          } > entry.md

          cat entry.md

      - name: Update CHANGELOG.md
        run: |
          if [ -f CHANGELOG.md ]; then
            # Insert the new entry after the first heading line
            awk '
              NR==1 { print; found_header=1; next }
              found_header && !inserted {
                # Print a blank line, the entry, then continue
                while ((getline line < "entry.md") > 0) print line
                print ""
                inserted=1
              }
              { print }
            ' CHANGELOG.md > CHANGELOG.tmp
            mv CHANGELOG.tmp CHANGELOG.md
          else
            {
              echo "# Changelog"
              echo ""
              cat entry.md
            } > CHANGELOG.md
          fi

          rm entry.md

      - name: Commit changelog
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "chore: update changelog for ${{ steps.version.outputs.tag }}"
          git push origin HEAD

      - name: Create tag
        run: |
          git tag -a "${{ steps.version.outputs.tag }}" -m "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "${{ steps.version.outputs.tag }}" \
            --generate-notes
